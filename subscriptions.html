<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscriptions – SubSmart</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 24px 16px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
      margin-bottom: 32px;
    }

    .sidebar-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-gradient);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
    }

    .sidebar-logo h2 {
      font-size: 20px;
      font-weight: 700;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all var(--transition-normal);
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .nav-item-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-footer {
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 32px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .header-left h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header-left p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .header-right {
      display: flex;
      gap: 12px;
    }

    .filters-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 12px 16px 12px 44px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .filter-select {
      padding: 12px 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      min-width: 150px;
    }

    .filter-select:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .subscriptions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    .subscription-card {
      padding: 24px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all var(--transition-normal);
    }

    .subscription-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .subscription-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: var(--platform-color, var(--accent-primary));
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .card-info {
      flex: 1;
    }

    .card-platform {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .card-type {
      font-size: 13px;
      color: var(--text-secondary);
      text-transform: capitalize;
    }

    .card-status {
      margin-top: 4px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      opacity: 0;
      transition: opacity var(--transition-normal);
    }

    .subscription-card:hover .card-actions {
      opacity: 1;
    }

    .card-action-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      transition: all var(--transition-fast);
    }

    .card-action-btn:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .card-action-btn.delete:hover {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .card-body {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .card-cost {
      font-size: 28px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .card-cycle {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card-renewal {
      text-align: right;
    }

    .card-renewal-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .card-renewal-date {
      font-size: 14px;
      font-weight: 500;
    }

    .card-countdown {
      margin-top: 4px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .card-countdown.warning {
      color: var(--warning);
    }

    .card-countdown.danger {
      color: var(--danger);
    }

    .unused-badge {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--warning-bg);
      color: var(--warning);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .stats-bar {
      display: flex;
      gap: 24px;
      padding: 20px 24px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stat-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .stat-icon.warning {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .stat-icon.danger {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .stat-content {

    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-state h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 8px 0;
      z-index: 100;
    }

    .bottom-nav-items {
      display: flex;
      justify-content: space-around;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
      transition: color var(--transition-fast);
    }

    .bottom-nav-item.active {
      color: var(--accent-primary);
    }

    .bottom-nav-item-icon {
      font-size: 20px;
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main-content {
        margin-left: 0;
        padding: 20px;
        padding-bottom: 80px;
      }

      .bottom-nav {
        display: block;
      }

      .subscriptions-grid {
        grid-template-columns: 1fr;
      }

      .filters-bar {
        flex-direction: column;
      }

      .filter-select {
        width: 100%;
      }

      .stats-bar {
        flex-direction: column;
        gap: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <h2>SubSmart</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-item-icon">📊</span>
          Dashboard
        </a>
        <a href="subscriptions.html" class="nav-item active">
          <span class="nav-item-icon">📋</span>
          Subscriptions
        </a>
        <a href="add-subscription.html" class="nav-item">
          <span class="nav-item-icon">➕</span>
          Add New
        </a>
        <a href="insights.html" class="nav-item">
          <span class="nav-item-icon">🧠</span>
          AI Insights
        </a>
        <a href="calendar.html" class="nav-item">
          <span class="nav-item-icon">📅</span>
          Calendar
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-item-icon">⚙️</span>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="settings.html" class="nav-item">
          <span class="nav-item-icon">👤</span>
          Profile
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="header-left">
          <h1>Subscriptions</h1>
          <p>Manage all your active subscriptions</p>
        </div>
        <div class="header-right">
          <a href="add-subscription.html" class="btn btn-primary">
            <span>➕</span> Add New
          </a>
        </div>
      </header>

      <div class="stats-bar" id="stats-bar">
        <div class="stat-item">
          <div class="stat-icon" style="background: var(--success-bg); color: var(--success);">📱</div>
          <div class="stat-content">
            <div class="stat-value" id="active-stat">0</div>
            <div class="stat-label">Active</div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-icon warning">⚠️</div>
          <div class="stat-content">
            <div class="stat-value" id="expiring-stat">0</div>
            <div class="stat-label">Expiring Soon</div>
          </div>
        </div>
        <div class="stat-item">
          <div class="stat-icon danger">💸</div>
          <div class="stat-content">
            <div class="stat-value" id="unused-stat">0</div>
            <div class="stat-label">Unused (30+ days)</div>
          </div>
        </div>
      </div>

      <div class="filters-bar">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search subscriptions...">
        </div>
        <select class="filter-select" id="sort-select">
          <option value="renewal">Sort by Renewal</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name A-Z</option>
        </select>
        <select class="filter-select" id="status-filter">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="expiring">Expiring Soon</option>
          <option value="unused">Unused</option>
        </select>
      </div>

      <div class="subscriptions-grid" id="subscriptions-grid">
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="dashboard.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">📊</span>
          Dashboard
        </a>
        <a href="subscriptions.html" class="bottom-nav-item active">
          <span class="bottom-nav-item-icon">📋</span>
          Subscriptions
        </a>
        <a href="add-subscription.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">➕</span>
          Add
        </a>
        <a href="insights.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">🧠</span>
          Insights
        </a>
        <a href="settings.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">⚙️</span>
          Settings
        </a>
      </div>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;

      loadSubscriptions();
      setupFilters();
    });

    function loadSubscriptions() {
      let subscriptions = DataStore.getSubscriptions();
      subscriptions = subscriptions.map(s => ({
        ...s,
        daysRemaining: DataStore.getDaysRemaining(s.nextRenewal),
        daysSinceUsed: DataStore.getDaysSince(s.lastUsed)
      }));

      subscriptions.forEach(sub => {
        if (sub.status !== 'expired') {
          DataStore.updateSubscriptionStatus(sub);
        }
      });
      DataStore.setSubscriptions(subscriptions);

      updateStats(subscriptions);
      renderSubscriptions(subscriptions);
    }

    function updateStats(subscriptions) {
      const active = subscriptions.filter(s => s.status === 'active').length;
      const expiring = subscriptions.filter(s => s.status === 'expiring').length;
      const unused = subscriptions.filter(s => s.daysSinceUsed > 30).length;

      document.getElementById('active-stat').textContent = active;
      document.getElementById('expiring-stat').textContent = expiring;
      document.getElementById('unused-stat').textContent = unused;
    }

    function renderSubscriptions(subscriptions) {
      const grid = document.getElementById('subscriptions-grid');

      if (subscriptions.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <h3>No subscriptions found</h3>
            <p>Add your first subscription to get started</p>
            <a href="add-subscription.html" class="btn btn-primary">Add Subscription</a>
          </div>
        `;
        return;
      }

      grid.innerHTML = subscriptions.map(sub => {
        const platformInfo = UI.getPlatformInfo(sub.platform);
        const daysRemaining = DataStore.getDaysRemaining(sub.nextRenewal);
        const daysSinceUsed = DataStore.getDaysSince(sub.lastUsed);
        const isUnused = daysSinceUsed > 30;
        const countdownClass = daysRemaining <= 3 ? 'danger' : daysRemaining <= 7 ? 'warning' : '';

        return `
          <div class="subscription-card glass-card" style="--platform-color: ${platformInfo.color}" data-id="${sub.id}">
            ${isUnused ? '<span class="unused-badge">⚠ Unused</span>' : ''}
            <div class="card-header">
              ${UI.createPlatformLogo(sub.platform)}
              <div class="card-info">
                <div class="card-platform">${sub.platform}</div>
                <div class="card-type">${sub.type} • ${sub.billingCycle}</div>
                <div class="card-status">${UI.getStatusBadge(sub.status)}</div>
              </div>
              <div class="card-actions">
                <button class="card-action-btn edit" data-id="${sub.id}" title="Edit">✏️</button>
                <button class="card-action-btn delete" data-id="${sub.id}" title="Delete">🗑️</button>
              </div>
            </div>
            <div class="card-body">
              <div>
                <div class="card-cost">${DataStore.formatCurrency(sub.cost)}</div>
                <div class="card-cycle">per ${sub.billingCycle === 'monthly' ? 'month' : 'year'}</div>
              </div>
              <div class="card-renewal">
                <div class="card-renewal-label">Next Renewal</div>
                <div class="card-renewal-date">${DataStore.formatDateShort(sub.nextRenewal)}</div>
                <div class="card-countdown ${countdownClass}">${daysRemaining} days left</div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.subscription-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (!e.target.closest('.card-action-btn')) {
            window.location.href = `subscription-detail.html?id=${card.dataset.id}`;
          }
        });
      });

      document.querySelectorAll('.card-action-btn.edit').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          window.location.href = `subscription-detail.html?id=${btn.dataset.id}&edit=true`;
        });
      });

      document.querySelectorAll('.card-action-btn.delete').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = btn.dataset.id;
          const sub = subscriptions.find(s => s.id === id);
          
          UI.confirmDelete(
            'Delete Subscription',
            `Are you sure you want to delete ${sub.platform}? This action cannot be undone.`,
            () => {
              const subs = DataStore.getSubscriptions().filter(s => s.id !== id);
              DataStore.setSubscriptions(subs);
              UI.showToast(`${sub.platform} deleted successfully`, 'success');
              loadSubscriptions();
            }
          );
        });
      });
    }

    function setupFilters() {
      const searchInput = document.getElementById('search-input');
      const sortSelect = document.getElementById('sort-select');
      const statusFilter = document.getElementById('status-filter');

      const applyFilters = UI.debounce(() => {
        let subscriptions = DataStore.getSubscriptions();
        const search = searchInput.value.toLowerCase();
        const sort = sortSelect.value;
        const status = statusFilter.value;

        subscriptions = subscriptions.filter(sub => {
          const matchesSearch = sub.platform.toLowerCase().includes(search);
          return matchesSearch;
        });

        if (status === 'expiring') {
          subscriptions = subscriptions.filter(sub => {
            const days = DataStore.getDaysRemaining(sub.nextRenewal);
            return days <= 7 && days >= 0;
          });
        } else if (status === 'unused') {
          subscriptions = subscriptions.filter(sub => {
            return DataStore.getDaysSince(sub.lastUsed) > 30;
          });
        }

        subscriptions.sort((a, b) => {
          switch (sort) {
            case 'renewal':
              return new Date(a.nextRenewal) - new Date(b.nextRenewal);
            case 'price-asc':
              return DataStore.getMonthlyEquivalent(a.cost, a.billingCycle) - 
                     DataStore.getMonthlyEquivalent(b.cost, b.billingCycle);
            case 'price-desc':
              return DataStore.getMonthlyEquivalent(b.cost, b.billingCycle) - 
                     DataStore.getMonthlyEquivalent(a.cost, a.billingCycle);
            case 'name':
              return a.platform.localeCompare(b.platform);
            default:
              return 0;
          }
        });

        renderSubscriptions(subscriptions);
      }, 300);

      searchInput.addEventListener('input', applyFilters);
      sortSelect.addEventListener('change', applyFilters);
      statusFilter.addEventListener('change', applyFilters);
    }
  </script>
</body>
</html>
