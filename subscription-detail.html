<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscription Detail – SubSmart</title>
  <link rel="stylesheet" href="css/style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    .app-layout {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 24px 16px;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 8px;
      margin-bottom: 32px;
    }

    .sidebar-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--accent-gradient);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
    }

    .sidebar-logo h2 {
      font-size: 20px;
      font-weight: 700;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      transition: all var(--transition-normal);
    }

    .nav-item:hover {
      background: var(--bg-card);
      color: var(--text-primary);
    }

    .nav-item.active {
      background: var(--accent-gradient);
      color: white;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
    }

    .nav-item-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
    }

    .sidebar-footer {
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
    }

    .main-content {
      flex: 1;
      margin-left: var(--sidebar-width);
      padding: 32px;
      min-height: 100vh;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .back-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-card);
      color: var(--text-secondary);
      transition: all var(--transition-normal);
    }

    .back-btn:hover {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .header-title h1 {
      font-size: 24px;
      font-weight: 700;
    }

    .header-title p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 32px;
      background: var(--bg-secondary);
      border-radius: var(--radius-xl);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .detail-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--platform-color, #6366f1) 0%, transparent 60%);
      opacity: 0.1;
    }

    .detail-logo {
      position: relative;
      z-index: 1;
    }

    .detail-info {
      flex: 1;
      position: relative;
      z-index: 1;
    }

    .detail-info h2 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .detail-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .detail-meta span {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .detail-cost {
      text-align: right;
      position: relative;
      z-index: 1;
    }

    .detail-cost-value {
      font-size: 36px;
      font-weight: 700;
      font-family: var(--font-mono);
    }

    .detail-cost-cycle {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 24px;
    }

    .detail-card {
      padding: 24px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .info-item {
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }

    .info-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .info-value {
      font-size: 16px;
      font-weight: 600;
    }

    .info-value.mono {
      font-family: var(--font-mono);
    }

    .info-value.countdown {
      color: var(--success);
    }

    .info-value.countdown.warning {
      color: var(--warning);
    }

    .info-value.countdown.danger {
      color: var(--danger);
    }

    .ai-insights {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
      border: 1px solid rgba(99, 102, 241, 0.2);
    }

    .ai-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .ai-badge {
      background: var(--accent-gradient);
      color: white;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      font-weight: 600;
    }

    .usage-status {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }

    .usage-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .usage-icon.frequent {
      background: var(--success-bg);
      color: var(--success);
    }

    .usage-icon.rare {
      background: var(--warning-bg);
      color: var(--warning);
    }

    .usage-info h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .usage-info p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .recommendation {
      padding: 20px;
      border-radius: var(--radius-md);
      text-align: center;
    }

    .recommendation.keep {
      background: var(--success-bg);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .recommendation.cancel {
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .recommendation-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .recommendation h4 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .recommendation p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .savings {
      margin-top: 16px;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
    }

    .savings-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .savings-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--success);
      font-family: var(--font-mono);
    }

    .payment-section {
      margin-top: 20px;
    }

    .payment-method {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
    }

    .payment-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .payment-details {
      flex: 1;
    }

    .payment-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .payment-status {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .auto-renew-ui {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      margin-top: 16px;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
      background: var(--bg-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: background var(--transition-normal);
    }

    .toggle-switch.active {
      background: var(--accent-primary);
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform var(--transition-normal);
    }

    .toggle-switch.active::after {
      transform: translateX(22px);
    }

    .mini-chart {
      height: 200px;
      margin-top: 16px;
      position: relative;
      width: 100%;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      padding: 16px;
    }
    
    .mini-chart canvas {
      width: 100% !important;
      height: 100% !important;
      max-height: 168px;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-buttons .btn {
      flex: 1;
    }

    .cancel-guide {
      margin-top: 24px;
    }

    .cancel-guide-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: background var(--transition-fast);
    }

    .cancel-guide-header:hover {
      background: var(--bg-card);
    }

    .cancel-guide-content {
      display: none;
      padding: 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-top: 8px;
    }

    .cancel-guide-content.show {
      display: block;
      animation: slideUp 0.3s ease;
    }

    .cancel-step {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-color);
    }

    .cancel-step:last-child {
      border-bottom: none;
    }

    .step-number {
      width: 24px;
      height: 24px;
      background: var(--accent-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .step-content h5 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .step-content p {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .bottom-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
      padding: 8px 0;
      z-index: 100;
    }

    .bottom-nav-items {
      display: flex;
      justify-content: space-around;
    }

    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 500;
    }

    .bottom-nav-item.active {
      color: var(--accent-primary);
    }

    .bottom-nav-item-icon {
      font-size: 20px;
    }

    @media (max-width: 1024px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .sidebar {
        display: none;
      }

      .main-content {
        margin-left: 0;
        padding: 20px;
        padding-bottom: 80px;
      }

      .bottom-nav {
        display: block;
      }

      .detail-header {
        flex-direction: column;
        text-align: center;
      }

      .detail-cost {
        text-align: center;
      }

      .detail-meta {
        justify-content: center;
        flex-wrap: wrap;
      }

      .action-buttons {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">S</div>
        <h2>SubSmart</h2>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item">
          <span class="nav-item-icon">📊</span>
          Dashboard
        </a>
        <a href="subscriptions.html" class="nav-item active">
          <span class="nav-item-icon">📋</span>
          Subscriptions
        </a>
        <a href="add-subscription.html" class="nav-item">
          <span class="nav-item-icon">➕</span>
          Add New
        </a>
        <a href="insights.html" class="nav-item">
          <span class="nav-item-icon">🧠</span>
          AI Insights
        </a>
        <a href="calendar.html" class="nav-item">
          <span class="nav-item-icon">📅</span>
          Calendar
        </a>
        <a href="settings.html" class="nav-item">
          <span class="nav-item-icon">⚙️</span>
          Settings
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="settings.html" class="nav-item">
          <span class="nav-item-icon">👤</span>
          Profile
        </a>
      </div>
    </aside>

    <main class="main-content">
      <header class="header">
        <a href="subscriptions.html" class="back-btn">←</a>
        <div class="header-title">
          <h1>Subscription Details</h1>
          <p>View and manage your subscription</p>
        </div>
      </header>

      <div id="content">
      </div>
    </main>

    <nav class="bottom-nav">
      <div class="bottom-nav-items">
        <a href="dashboard.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">📊</span>
          Dashboard
        </a>
        <a href="subscriptions.html" class="bottom-nav-item active">
          <span class="bottom-nav-item-icon">📋</span>
          Subscriptions
        </a>
        <a href="add-subscription.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">➕</span>
          Add
        </a>
        <a href="insights.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">🧠</span>
          Insights
        </a>
        <a href="settings.html" class="bottom-nav-item">
          <span class="bottom-nav-item-icon">⚙️</span>
          Settings
        </a>
      </div>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!Auth.requireAuth()) return;

      const urlParams = new URLSearchParams(window.location.search);
      const subId = urlParams.get('id');
      const editMode = urlParams.get('edit') === 'true';

      if (!subId) {
        window.location.href = 'subscriptions.html';
        return;
      }

      const subscriptions = DataStore.getSubscriptions();
      const subscription = subscriptions.find(s => s.id === subId);

      if (!subscription) {
        window.location.href = 'subscriptions.html';
        return;
      }

      DataStore.updateSubscriptionStatus(subscription);
      renderSubscriptionDetail(subscription, editMode);
    });

    function renderSubscriptionDetail(sub, editMode) {
      const platformInfo = UI.getPlatformInfo(sub.platform);
      const daysRemaining = DataStore.getDaysRemaining(sub.nextRenewal);
      const daysSinceUsed = DataStore.getDaysSince(sub.lastUsed);
      const totalSpent = DataStore.calculateTotalSpent(sub);
      const monthsSubscribed = DataStore.getMonthsBetween(new Date(sub.startDate), new Date());
      const countdownClass = daysRemaining <= 3 ? 'danger' : daysRemaining <= 7 ? 'warning' : '';
      const usageFrequent = daysSinceUsed <= 14;
      const recommendCancel = daysSinceUsed > 45;

      const paymentIcons = {
        upi: '📱',
        card: '💳',
        wallet: '👛'
      };

      const paymentNames = {
        upi: 'UPI',
        card: 'Credit/Debit Card',
        wallet: 'Wallet'
      };

      document.getElementById('content').innerHTML = `
        <div class="detail-header" style="--platform-color: ${platformInfo.color}">
          <div class="detail-logo">
            ${UI.createPlatformLogo(sub.platform, 'lg')}
          </div>
          <div class="detail-info">
            <h2>${sub.platform}</h2>
            <div class="detail-meta">
              <span>${sub.type.charAt(0).toUpperCase() + sub.type.slice(1)} Plan</span>
              <span>•</span>
              ${UI.getStatusBadge(sub.status)}
            </div>
          </div>
          <div class="detail-cost">
            <div class="detail-cost-value">${DataStore.formatCurrency(sub.cost)}</div>
            <div class="detail-cost-cycle">per ${sub.billingCycle === 'monthly' ? 'month' : 'year'}</div>
          </div>
        </div>

        <div class="content-grid">
          <div class="left-column">
            <div class="detail-card glass-card">
              <h3 class="card-title">📋 Subscription Details</h3>
              <div class="info-grid">
                <div class="info-item">
                  <div class="info-label">Platform</div>
                  <div class="info-value">${sub.platform}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Type</div>
                  <div class="info-value">${sub.type.charAt(0).toUpperCase() + sub.type.slice(1)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Cost</div>
                  <div class="info-value mono">${DataStore.formatCurrency(sub.cost)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Billing Cycle</div>
                  <div class="info-value">${sub.billingCycle.charAt(0).toUpperCase() + sub.billingCycle.slice(1)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Next Renewal</div>
                  <div class="info-value">${DataStore.formatDate(sub.nextRenewal)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Last Payment</div>
                  <div class="info-value">${DataStore.formatDate(sub.lastPayment)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Start Date</div>
                  <div class="info-value">${DataStore.formatDate(sub.startDate)}</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Days Remaining</div>
                  <div class="info-value countdown ${countdownClass}">${daysRemaining} days</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Total Duration</div>
                  <div class="info-value">${monthsSubscribed} months</div>
                </div>
                <div class="info-item">
                  <div class="info-label">Total Spent</div>
                  <div class="info-value mono">${DataStore.formatCurrency(totalSpent)}</div>
                </div>
              </div>
            </div>

            <div class="detail-card glass-card" style="margin-top: 24px;">
              <h3 class="card-title">📈 Spending Trend</h3>
              <div class="mini-chart">
                <canvas id="spendingChart"></canvas>
              </div>
            </div>

            <div class="action-buttons">
              <a href="subscriptions.html" class="btn btn-secondary">Back</a>
              <button class="btn btn-primary" id="edit-btn">✏️ Edit</button>
              <button class="btn btn-danger" id="delete-btn">🗑️ Delete</button>
            </div>

            <div class="cancel-guide">
              <div class="cancel-guide-header" id="cancel-guide-toggle">
                <span><strong>How to Cancel ${sub.platform}</strong></span>
                <span>▼</span>
              </div>
              <div class="cancel-guide-content" id="cancel-guide-content">
                <div class="cancel-step">
                  <div class="step-number">1</div>
                  <div class="step-content">
                    <h5>Log into your account</h5>
                    <p>Visit ${sub.platform}'s website and sign in with your credentials.</p>
                  </div>
                </div>
                <div class="cancel-step">
                  <div class="step-number">2</div>
                  <div class="step-content">
                    <h5>Go to Account Settings</h5>
                    <p>Find the "Account" or "Manage Subscription" section in your profile.</p>
                  </div>
                </div>
                <div class="cancel-step">
                  <div class="step-number">3</div>
                  <div class="step-content">
                    <h5>Select Cancel Subscription</h5>
                    <p>Follow the prompts to confirm cancellation. You may need to provide a reason.</p>
                  </div>
                </div>
                <div class="cancel-step">
                  <div class="step-number">4</div>
                  <div class="step-content">
                    <h5>Confirm Cancellation</h5>
                    <p>Make sure you receive a confirmation email and note the end date.</p>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="right-column">
            <div class="detail-card glass-card ai-insights">
              <h3 class="card-title">
                🧠 AI Insights
                <span class="ai-badge">Smart</span>
              </h3>

              <div class="usage-status">
                <div class="usage-icon ${usageFrequent ? 'frequent' : 'rare'}">
                  ${usageFrequent ? '🔥' : '💤'}
                </div>
                <div class="usage-info">
                  <h4>${usageFrequent ? 'Frequent' : 'Rare'} Usage</h4>
                  <p>${usageFrequent ? 'You use this regularly!' : `You haven't used this in ${daysSinceUsed} days`}</p>
                </div>
              </div>

              <div class="recommendation ${recommendCancel ? 'cancel' : 'keep'}">
                <div class="recommendation-icon">${recommendCancel ? '❌' : '✅'}</div>
                <h4>${recommendCancel ? 'Consider Cancelling' : 'Keep it!'}</h4>
                <p>${recommendCancel 
                  ? `This subscription hasn't been used in ${daysSinceUsed} days. You could save ${DataStore.formatCurrency(DataStore.getMonthlyEquivalent(sub.cost, sub.billingCycle) * 12)}/year` 
                  : 'This subscription shows regular usage and provides good value.'
                }</p>
              </div>

              ${recommendCancel ? `
                <div class="savings">
                  <div class="savings-label">Potential Yearly Savings</div>
                  <div class="savings-value">${DataStore.formatCurrency(DataStore.getMonthlyEquivalent(sub.cost, sub.billingCycle) * 12)}</div>
                </div>
              ` : ''}
            </div>

            <div class="detail-card glass-card" style="margin-top: 24px;">
              <h3 class="card-title">💳 Payment Info</h3>
              
              <div class="payment-section">
                <div class="payment-method">
                  <div class="payment-icon">${paymentIcons[sub.paymentMethod]}</div>
                  <div class="payment-details">
                    <div class="payment-name">${paymentNames[sub.paymentMethod]}</div>
                    <div class="payment-status">Last paid ${DataStore.formatDateShort(sub.lastPayment)}</div>
                  </div>
                </div>

                <div class="auto-renew-ui">
                  <div>
                    <div class="font-medium">Auto-Renew</div>
                    <div class="text-sm text-secondary">Automatically renews</div>
                  </div>
                  <div class="toggle-switch ${sub.autoRenew ? 'active' : ''}" id="auto-renew-toggle"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;

      initSpendingChart(sub);
      setupDetailActions(sub);
      setupCancelGuide();
    }

    function initSpendingChart(sub) {
      if (typeof Chart === 'undefined') {
        console.error('Chart.js not loaded');
        return;
      }
      
      const monthly = DataStore.getMonthlyEquivalent(sub.cost, sub.billingCycle);
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'];
      const data = Array(6).fill(monthly);

      const ctx = document.getElementById('spendingChart').getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 200);
      gradient.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
      gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: months,
          datasets: [{
            data: data,
            borderColor: '#6366f1',
            backgroundColor: gradient,
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointBackgroundColor: '#6366f1'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#12121a',
              titleColor: '#fff',
              bodyColor: '#94a3b8',
              borderColor: 'rgba(255,255,255,0.1)',
              borderWidth: 1,
              padding: 12,
              callbacks: {
                label: (context) => '₹' + context.raw.toLocaleString('en-IN')
              }
            }
          },
          scales: {
            x: {
              grid: { display: false },
              ticks: { color: '#64748b' }
            },
            y: {
              grid: { color: 'rgba(255,255,255,0.05)' },
              ticks: {
                color: '#64748b',
                callback: (value) => '₹' + value
              }
            }
          },
          animation: {
            duration: 1000
          }
        }
      });
    }

    function setupDetailActions(sub) {
      document.getElementById('edit-btn').addEventListener('click', () => {
        window.location.href = `add-subscription.html?edit=${sub.id}`;
      });

      document.getElementById('delete-btn').addEventListener('click', () => {
        UI.confirmDelete(
          'Delete Subscription',
          `Are you sure you want to delete ${sub.platform}? This action cannot be undone.`,
          () => {
            const subs = DataStore.getSubscriptions().filter(s => s.id !== sub.id);
            DataStore.setSubscriptions(subs);
            UI.showToast(`${sub.platform} deleted successfully`, 'success');
            setTimeout(() => {
              window.location.href = 'subscriptions.html';
            }, 1000);
          }
        );
      });

      const autoRenewToggle = document.getElementById('auto-renew-toggle');
      autoRenewToggle.addEventListener('click', () => {
        autoRenewToggle.classList.toggle('active');
        sub.autoRenew = autoRenewToggle.classList.contains('active');
        
        const subs = DataStore.getSubscriptions();
        const index = subs.findIndex(s => s.id === sub.id);
        if (index !== -1) {
          subs[index] = sub;
          DataStore.setSubscriptions(subs);
        }
        
        UI.showToast(`Auto-renew ${sub.autoRenew ? 'enabled' : 'disabled'}`, 'success');
      });
    }

    function setupCancelGuide() {
      const toggle = document.getElementById('cancel-guide-toggle');
      const content = document.getElementById('cancel-guide-content');

      toggle.addEventListener('click', () => {
        content.classList.toggle('show');
        toggle.querySelector('span:last-child').textContent = content.classList.contains('show') ? '▲' : '▼';
      });
    }
  </script>
</body>
</html>
