<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubSmart – OTT Subscription Manager</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-primary);
      position: relative;
      overflow: hidden;
    }

    .auth-bg-pattern {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 40px;
      position: relative;
      z-index: 1;
      animation: scaleIn 0.4s ease;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-logo-icon {
      width: 64px;
      height: 64px;
      background: var(--accent-gradient);
      border-radius: var(--radius-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
    }

    .auth-logo h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .auth-logo p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .auth-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: var(--radius-md);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      transition: all var(--transition-normal);
    }

    .auth-tab.active {
      background: var(--bg-card-hover);
      color: var(--text-primary);
    }

    .auth-tab:hover:not(.active) {
      color: var(--text-primary);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    .password-strength {
      height: 4px;
      background: var(--bg-tertiary);
      border-radius: var(--radius-full);
      margin-top: 8px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0%;
      transition: all var(--transition-normal);
      border-radius: var(--radius-full);
    }

    .password-strength-bar.weak { width: 33%; background: var(--danger); }
    .password-strength-bar.medium { width: 66%; background: var(--warning); }
    .password-strength-bar.strong { width: 100%; background: var(--success); }

    .demo-credentials {
      margin-top: 24px;
      padding: 16px;
      background: var(--info-bg);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: var(--radius-md);
      font-size: 13px;
    }

    .demo-credentials strong {
      color: var(--info);
      display: block;
      margin-bottom: 8px;
    }

    .demo-credentials code {
      font-family: var(--font-mono);
      background: var(--bg-secondary);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--text-primary);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border-color);
      font-size: 13px;
      color: var(--text-secondary);
    }

    .auth-footer a {
      color: var(--accent-primary);
      font-weight: 500;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-wrapper input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--accent-primary);
      margin-top: 2px;
    }

    .checkbox-wrapper label {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .checkbox-wrapper label a {
      color: var(--accent-primary);
    }

    .error-message {
      display: none;
      padding: 12px 16px;
      background: var(--danger-bg);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: var(--radius-md);
      color: var(--danger);
      font-size: 14px;
      margin-bottom: 20px;
      align-items: center;
      gap: 8px;
    }

    .error-message.show {
      display: flex;
      animation: shake 0.4s ease;
    }

    .success-animation {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .success-animation.show {
      display: block;
      animation: scaleIn 0.4s ease;
    }

    .success-checkmark {
      width: 80px;
      height: 80px;
      background: var(--success);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 20px;
      animation: bounce 0.6s ease;
    }

    .success-animation h3 {
      font-size: 20px;
      margin-bottom: 8px;
    }

    .success-animation p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    @media (max-width: 480px) {
      .auth-card {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-bg-pattern"></div>
    
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">S</div>
        <h1>SubSmart</h1>
        <p>Manage your subscriptions smarter</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Sign In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <div id="login-form" class="auth-form active">
        <div class="error-message" id="login-error">
          <span>⚠</span>
          <span class="error-text"></span>
        </div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <div class="input-wrapper">
            <input type="email" class="input-field" id="login-email" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <input type="password" class="input-field" id="login-password" placeholder="Enter your password" required>
            <span class="toggle-password" data-target="login-password">👁</span>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" style="width: 100%" id="login-btn">
          Sign In
        </button>

        <div class="demo-credentials">
          <strong>Demo Credentials</strong>
          Email: <code>demo@user.com</code><br>
          Password: <code>123456</code>
        </div>
      </div>

      <div id="signup-form" class="auth-form">
        <div class="input-group">
          <label class="input-label">Full Name</label>
          <input type="text" class="input-field" id="signup-name" placeholder="Enter your name">
        </div>

        <div class="input-group">
          <label class="input-label">Email Address</label>
          <input type="email" class="input-field" id="signup-email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
          <label class="input-label">Password</label>
          <div class="input-wrapper">
            <input type="password" class="input-field" id="signup-password" placeholder="Create a password" required>
            <span class="toggle-password" data-target="signup-password">👁</span>
          </div>
          <div class="password-strength">
            <div class="password-strength-bar" id="password-strength"></div>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" class="input-field" id="signup-confirm" placeholder="Confirm your password" required>
            <span class="toggle-password" data-target="signup-confirm">👁</span>
          </div>
        </div>

        <div class="checkbox-wrapper">
          <input type="checkbox" id="terms">
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>

        <button class="btn btn-primary btn-lg" style="width: 100%" id="signup-btn">
          Create Account
        </button>
      </div>

      <div id="success-animation" class="success-animation">
        <div class="success-checkmark">✓</div>
        <h3>Welcome!</h3>
        <p>Redirecting to your dashboard...</p>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isAuthenticated()) {
        window.location.href = 'dashboard.html';
        return;
      }

      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      const loginBtn = document.getElementById('login-btn');
      const signupBtn = document.getElementById('signup-btn');
      const loginError = document.getElementById('login-error');
      const passwordStrength = document.getElementById('password-strength');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const targetTab = tab.dataset.tab;
          
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          forms.forEach(form => {
            form.classList.remove('active');
            if (form.id === `${targetTab}-form`) {
              form.classList.add('active');
            }
          });
          
          loginError.classList.remove('show');
        });
      });

      document.querySelectorAll('.toggle-password').forEach(toggle => {
        toggle.addEventListener('click', () => {
          const input = document.getElementById(toggle.dataset.target);
          input.type = input.type === 'password' ? 'text' : 'password';
          toggle.textContent = input.type === 'password' ? '👁' : '🙈';
        });
      });

      const checkPasswordStrength = (password) => {
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 10) strength++;
        if (/[A-Z]/.test(password) && /[a-z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        return strength;
      };

      document.getElementById('signup-password').addEventListener('input', (e) => {
        const strength = checkPasswordStrength(e.target.value);
        passwordStrength.className = 'password-strength-bar';
        if (strength <= 2) passwordStrength.classList.add('weak');
        else if (strength <= 3) passwordStrength.classList.add('medium');
        else passwordStrength.classList.add('strong');
      });

      loginBtn.addEventListener('click', async () => {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;

        if (!email || !password) {
          loginError.querySelector('.error-text').textContent = 'Please fill in all fields';
          loginError.classList.add('show');
          return;
        }

        if (!this.validateEmail(email)) {
          loginError.querySelector('.error-text').textContent = 'Please enter a valid email address';
          loginError.classList.add('show');
          return;
        }

        UI.showLoading(loginBtn);
        loginError.classList.remove('show');

        try {
          await Auth.login(email, password);
          document.getElementById('login-form').style.display = 'none';
          document.querySelector('.auth-logo').style.display = 'none';
          document.querySelector('.auth-tabs').style.display = 'none';
          document.getElementById('success-animation').classList.add('show');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } catch (error) {
          loginError.querySelector('.error-text').textContent = error.message;
          loginError.classList.add('show');
          UI.hideLoading(loginBtn);
        }
      });

      signupBtn.addEventListener('click', async () => {
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const confirm = document.getElementById('signup-confirm').value;
        const terms = document.getElementById('terms').checked;

        if (!email || !password || !confirm) {
          UI.showToast('Please fill in all required fields', 'error');
          return;
        }

        if (!this.validateEmail(email)) {
          UI.showToast('Please enter a valid email address', 'error');
          return;
        }

        if (password.length < 6) {
          UI.showToast('Password must be at least 6 characters', 'error');
          return;
        }

        if (password !== confirm) {
          UI.showToast('Passwords do not match', 'error');
          return;
        }

        if (!terms) {
          UI.showToast('Please accept the terms and conditions', 'error');
          return;
        }

        UI.showLoading(signupBtn);

        try {
          await Auth.signup(email, password, name);
          document.getElementById('signup-form').style.display = 'none';
          document.querySelector('.auth-logo').style.display = 'none';
          document.querySelector('.auth-tabs').style.display = 'none';
          document.getElementById('success-animation').classList.add('show');
          
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 1500);
        } catch (error) {
          UI.showToast('An error occurred. Please try again.', 'error');
          UI.hideLoading(signupBtn);
        }
      });

      this.validateEmail = (email) => {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      };
    });
  </script>
</body>
</html>
